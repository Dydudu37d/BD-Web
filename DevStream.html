<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroSamaOS Dev Room (Peer-Stream)</title>
    <!-- 引入 Peer-Stream 核心。它會自動把原生 video 標籤擴展為具有 WebRTC 功能的 peer-stream -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050505; overflow: hidden; font-family: monospace; color: #00ff66; }
        .container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        /* 讓畫面完美鋪滿，並保持原有比例 */
        video { width: 100%; height: calc(100% - 40px); background: #000; object-fit: contain; }
        .bar { width: 100%; height: 40px; background: #111; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; width: 100%; }
        button { background: #00ff66; border: none; padding: 6px 14px; color: #000; font-weight: bold; cursor: pointer; border-radius: 3px; font-family: monospace; transition: all 0.2s; }
        button:hover { background: #00cc55; box-shadow: 0 0 10px #00ff66; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }
        .status { margin-left: 15px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 💡 這裡已經把你的 Cloudflare Worker 完全轉化為 wss:// 協議填入 id -->
        <video is="peer-stream" id="wss://nameless-scene-9cad.lifuan666.workers.dev" autoplay muted playsinline></video>
        
        <div class="bar">
            <button id="shareBtn" onclick="initArchShare()">🚀 共享屏幕與語音 (Arch 開發端點擊)</button>
            <span id="statusText" class="status">等待連線中...</span>
        </div>
    </div>

    <script>
        // 獲取已注入 peer-stream 擴充的原生 video 對象
        const ps = document.getElementById('wss://nameless-scene-9cad.lifuan666.workers.dev');
        const shareBtn = document.getElementById('shareBtn');
        const statusText = document.getElementById('statusText');

        // 監聽連線成功狀態
        ps.addEventListener('open', () => {
            statusText.innerText = "⚡️ 已成功連線至 Cloudflare 信令服務器";
            statusText.style.color = "#00ff66";
        });

        ps.addEventListener('close', () => {
            statusText.innerText = "❌ 與信令服務器斷開，正在重連...";
            statusText.style.color = "#ff3333";
        });

        // 💡 1. 國內朋友（接收端）打開網頁時：
        // 甚麼都不需要點，只要網頁一開，<video is="peer-stream"> 就會自動向你的 wss 服務器握手，並保持異步監聽。

        // 💡 2. 你的 Arch Linux（開發/推流端）操作：
        async function initArchShare() {
            try {
                statusText.innerText = "⏳ 正在請求 GNOME Wayland 權限...";
                
                // 1. 喚起 PipeWire 屏幕捕獲
                const screenStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { 
                        frameRate: { ideal: 30, max: 60 },
                        cursor: "always" // 確保遠端能看見你的鼠標操作
                    },
                    audio: true // 捕獲系統/當前窗口音頻（比如 AI 主播發出的聲音）
                });

                // 2. 喚起麥克風捕獲（如果你需要和朋友一邊看一邊語音）
                let finalStream = screenStream;
                try {
                    const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    
                    // 3. 硬核混音：利用 Web Audio API 把系統音頻和你的麥克風融合成一路高品質音軌
                    const audioContext = new AudioContext();
                    const destination = audioContext.createMediaStreamDestination();
                    
                    if (screenStream.getAudioTracks().length > 0) {
                        audioContext.createMediaStreamSource(screenStream).connect(destination);
                    }
                    if (micStream.getAudioTracks().length > 0) {
                        audioContext.createMediaStreamSource(micStream).connect(destination);
                    }

                    // 合併最終傳輸流
                    finalStream = new MediaStream([
                        ...screenStream.getVideoTracks(),
                        ...destination.stream.getAudioTracks()
                    ]);
                } catch (e) {
                    console.warn("未檢測到麥克風或權限拒絕，將僅分享屏幕和系統音頻：", e);
                }

                // ⚡️ 核心對接修正：最新版 Peer-Stream 的推流直接使用官方封裝好的方法，規避跨域沙盒問題
                // 這樣做會把你的 finalStream 通過 WebRTC 直接广播出去，國內接收端自動會接收到
                if (typeof ps.pushStream === 'function') {
                    ps.pushStream(finalStream);
                } else {
                    // 備用原生賦值（兼容部分舊版本代碼習慣）
                    ps.srcObject = finalStream;
                }
                
                shareBtn.innerText = "🟢 正在實時轉播中...";
                shareBtn.disabled = true;
                statusText.innerText = "🎉 推流成功！國內朋友現在刷新網頁即可直接觀看。";
                statusText.style.color = "#00ff66";
                
            } catch (err) {
                console.error("權限被拒絕或 PipeWire 未準備好:", err);
                statusText.innerText = "❌ 權限被拒絕或 PipeWire 錯誤";
                statusText.style.color = "#ff3333";
                alert("請確保在 GNOME Wayland 下允許了屏幕與音頻權限！");
            }
        }
    </script>
</body>
</html>
